<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# ------------------------
# NGINX ACCESS
# ------------------------

<filter nginx.access>
  @type record_transformer
  enable_ruby true

  <record>
    path ${record["uri"].split("?")[0] rescue record["uri"]}
    query_string ${record["uri"].include?("?") ? record["uri"].split("?")[1] : nil}
  </record>
</filter>

<filter nginx.access>
  @type record_transformer
  enable_ruby true

  <record>
    query_params ${record["query_string"] ? URI.decode_www_form(record["query_string"]).to_h : {}}
  </record>
</filter>

<filter nginx.access>
  @type record_transformer
  enable_ruby true

  <record>
    status ${record["status"].to_i rescue nil}
    bytes ${record["bytes"].to_i rescue nil}
  </record>
</filter>

<filter nginx.access>
  @type record_transformer
  remove_keys query_string
</filter>

# ------------------------
# OUTPUTS
# ------------------------

<match nginx.access>
  @type opensearch

  host 10.163.11.105
  port 9200
  scheme https

  user fluentd
  password "#{ENV['OS_PASSWORD']}"

  logstash_format true
  logstash_prefix nginx-access

  include_tag_key true
  tag_key @log_name

  pipeline geoip_pipeline

  ssl_verify false
  flush_interval 10s  
  request_timeout 30s
  reconnect_on_error true
</match>

<match nginx.error>
  @type opensearch

  host 10.163.11.105
  port 9200
  scheme https

  user fluentd
  password "#{ENV['OS_PASSWORD']}"

  logstash_format true
  logstash_prefix nginx-error

  include_tag_key true
  tag_key @log_name

  ssl_verify false
  flush_interval 10s  
  request_timeout 30s
  reconnect_on_error true
</match>

<match syslog.general>
  @type opensearch

  host 10.163.11.105
  port 9200
  scheme https

  user fluentd
  password "#{ENV['OS_PASSWORD']}"

  ssl_verify false
</match>