#[PARSER]
#    Name                docker
#    Format              json
#    Time_Key            time
#    Time_Format         %Y-%m-%dT%H:%M:%S.%L
#    Time_Keep           On
#    Decode_Field_As     escaped    log

[PARSER]
    Name        json
    Format      json  

[PARSER]
    Name        java_opensearch_log
    Format      regex
    Regex       ^\[(?<time>[^\]]+)\]\[(?<level>[A-Z]+)\]\[(?<logger>[^\]]+)\] \[(?<node>[^\]]+)\] \[(?<index>[^\]]+)\] (?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S,%L

[PARSER]
    Name        hassio_log
    Format      regex
    Regex       ^(?<level>[A-Z]+):(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d+):(?<logger>[^:]+):(?<message>.*)
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S,%L

[PARSER]
    Name        syslog-rfc5424
    Format      regex
    Regex       ^\<(?<pri>[0-9]{1,5})\>1 (?<time>[^ ]+) (?<host>[^ ]+) (?<ident>[^ ]+) (?<pid>[-0-9]+) (?<msgid>[^ ]+) (?<extradata>(\[(.*)\]|-)) (?<message>.+)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On
    Types pid:integer      

[PARSER]
    Name   log_parser
    Format regex
    Regex  ^\s*(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) \+\d{4} \[(?<level>\w+)\]: (?<message>.*)
    Time_Key time
    Time_Format %Y-%m-%d %H:%M:%S
