[SERVICE]
    Flush        5
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers.conf

# --- Common syslog ---
[INPUT]
    Name   syslog
    Listen 0.0.0.0
    Port   514
    Mode   udp
    Parser syslog-rfc3164
    Tag    syslog.general

# --- Nginx syslog ---
[INPUT]
    Name   syslog
    Listen 0.0.0.0
    Port   51414
    Mode   udp
    Parser syslog-rfc3164
    Tag    syslog.nginx

# --- Separate filter  for nginx ---
[FILTER]
    Name    parser
    Match   syslog.nginx
    Key_Name message
    Parser  proxy_log

[OUTPUT]
    Name   forward
    Match  *
    Host   10.163.11.105
    Port   24224